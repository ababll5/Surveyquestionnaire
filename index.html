<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常生活痛点与需求调查问卷</title>

<!-- Google Fonts: 优雅中文字体 + 数字字体 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS 变量 & 全局重置
   ============================================================ */
:root {
  /* 温暖毛玻璃调色板 */
  --bg-gradient-start: #e8d5f5;
  --bg-gradient-mid: #f0dde8;
  --bg-gradient-end: #fce4ec;

  --card-bg: rgba(255, 255, 255, 0.52);
  --card-border: rgba(255, 255, 255, 0.65);
  --card-shadow: 0 8px 40px rgba(124, 92, 191, 0.10),
                 0 2px 8px rgba(124, 92, 191, 0.06);

  --text-primary: #3d2e5c;
  --text-secondary: #7b6b9e;
  --text-hint: #b0a3c8;

  --accent-purple: #7c5cbf;
  --accent-pink: #e8738a;
  --accent-rose: #d4627a;

  --success: #81c784;
  --warning: #ffb74d;

  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 28px;
  --radius-full: 999px;

  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'DM Serif Display', 'Noto Sans SC', serif;

  --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  color: var(--text-primary);
  min-height: 100vh;
  /* 渐变背景：淡紫 → 淡粉 */
  background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
  background-attachment: fixed;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  /* 装饰性光斑 */
  position: relative;
  overflow-x: hidden;
}

/* 背景装饰光斑 */
body::before {
  content: '';
  position: fixed;
  top: -180px;
  right: -120px;
  width: 450px;
  height: 450px;
  background: radial-gradient(circle, rgba(232, 115, 138, 0.18) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -160px;
  left: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(124, 92, 191, 0.14) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   主容器
   ============================================================ */
.app-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ============================================================
   顶部 Header
   ============================================================ */
.app-header {
  text-align: center;
  padding: 8px 0 4px;
}
.app-header .logo {
  font-family: var(--font-display);
  font-size: 1.6rem;
  color: var(--accent-purple);
  letter-spacing: 0.02em;
}
.app-header .subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 400;
  margin-top: 2px;
}

/* ============================================================
   进度条区域
   ============================================================ */
.progress-area {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 4px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: rgba(255, 255, 255, 0.55);
  border-radius: var(--radius-full);
  overflow: hidden;
  box-shadow: inset 0 1px 2px rgba(124, 92, 191, 0.08);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
  border-radius: var(--radius-full);
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}
.progress-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 38px;
  text-align: right;
  letter-spacing: 0.02em;
}

/* ============================================================
   问题卡片 — 毛玻璃质感
   ============================================================ */
.question-card {
  background: var(--card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
  padding: 32px 28px 28px;
  transition: opacity var(--transition-smooth), transform var(--transition-smooth);
  min-height: 380px;
  display: flex;
  flex-direction: column;
}

/* 页面切换动画 */
.question-card.page-enter {
  animation: slideIn 0.38s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.question-card.page-exit {
  animation: slideOut 0.22s cubic-bezier(0.4, 0, 1, 1) forwards;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(36px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-36px); }
}

/* 板块标签 */
.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent-purple);
  background: rgba(124, 92, 191, 0.10);
  padding: 5px 14px;
  border-radius: var(--radius-full);
  margin-bottom: 14px;
  letter-spacing: 0.03em;
  width: fit-content;
}
.section-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent-purple);
}

/* 题目标题 */
.question-title {
  font-size: 1.18rem;
  font-weight: 600;
  line-height: 1.6;
  color: var(--text-primary);
  margin-bottom: 22px;
  letter-spacing: 0.01em;
}

/* 题目类型提示 */
.question-type-hint {
  font-size: 0.78rem;
  color: var(--text-hint);
  margin-bottom: 14px;
  font-weight: 400;
}

/* ============================================================
   选项按钮
   ============================================================ */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

/* 单选胶囊按钮 */
.option-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 14px 18px;
  font-size: 0.95rem;
  font-family: var(--font-sans);
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.55);
  border: 1.5px solid rgba(124, 92, 191, 0.14);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-spring);
  text-align: left;
  line-height: 1.5;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.option-btn:hover {
  border-color: rgba(124, 92, 191, 0.35);
  background: rgba(255, 255, 255, 0.75);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(124, 92, 191, 0.10);
}

/* 点击弹性反馈 */
.option-btn:active {
  transform: scale(0.97);
  transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* 选中态 */
.option-btn.selected {
  background: linear-gradient(135deg, rgba(124, 92, 191, 0.12), rgba(232, 115, 138, 0.10));
  border-color: var(--accent-purple);
  box-shadow: 0 2px 12px rgba(124, 92, 191, 0.13);
  font-weight: 500;
}
.option-btn.selected::after {
  content: '✓';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-purple);
}

/* 多选模式：已选计数徽标 */
.multi-counter {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent-purple);
  background: rgba(124, 92, 191, 0.10);
  padding: 4px 10px;
  border-radius: var(--radius-full);
  margin-left: auto;
}

/* 多选选项的勾选框样式 */
.option-btn.multi-mode {
  padding-right: 44px;
}
.option-btn.multi-mode .check-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 2px solid rgba(124, 92, 191, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-smooth);
  font-size: 0.7rem;
  color: transparent;
}
.option-btn.multi-mode.selected .check-icon {
  background: var(--accent-purple);
  border-color: var(--accent-purple);
  color: #fff;
}

/* ============================================================
   导航按钮
   ============================================================ */
.nav-row {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  font-family: var(--font-sans);
  font-size: 0.92rem;
  font-weight: 500;
  padding: 12px 28px;
  border-radius: var(--radius-full);
  border: none;
  cursor: pointer;
  transition: all var(--transition-spring);
  letter-spacing: 0.02em;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.btn:active {
  transform: scale(0.96);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.6);
  color: var(--text-secondary);
  border: 1.5px solid rgba(124, 92, 191, 0.15);
  backdrop-filter: blur(8px);
}
.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.8);
  border-color: rgba(124, 92, 191, 0.3);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-rose));
  color: #fff;
  box-shadow: 0 4px 18px rgba(124, 92, 191, 0.28);
  margin-left: auto;
}
.btn-primary:hover {
  box-shadow: 0 6px 24px rgba(124, 92, 191, 0.38);
  transform: translateY(-1px);
}
.btn-primary:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}

.btn-submit {
  width: 100%;
  padding: 15px;
  font-size: 1rem;
  font-weight: 600;
}

/* ============================================================
   欢迎页
   ============================================================ */
.welcome-content {
  text-align: center;
  padding: 16px 0;
}
.welcome-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  display: block;
}
.welcome-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  color: var(--accent-purple);
  margin-bottom: 8px;
}
.welcome-desc {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 24px;
}
.welcome-meta {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 0.82rem;
  color: var(--text-hint);
  margin-bottom: 24px;
}
.welcome-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ============================================================
   完成弹窗 / Modal
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(45, 25, 65, 0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal-card {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: var(--radius-lg);
  box-shadow: 0 20px 60px rgba(124, 92, 191, 0.18);
  padding: 32px 28px;
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  animation: scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.modal-header h2 {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: var(--accent-purple);
}
.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(124, 92, 191, 0.08);
  color: var(--text-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-smooth);
}
.modal-close:hover {
  background: rgba(124, 92, 191, 0.18);
  color: var(--text-primary);
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 16px;
}
.modal-body pre {
  background: rgba(124, 92, 191, 0.05);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
  border: 1px solid rgba(124, 92, 191, 0.1);
}

.modal-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* ============================================================
   提示 Toast
   ============================================================ */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: var(--radius-full);
  padding: 10px 22px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  box-shadow: 0 8px 28px rgba(124, 92, 191, 0.14);
  z-index: 200;
  animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-14px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.toast-out {
  animation: toastOut 0.3s ease forwards;
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(-50%) translateY(0); }
  to   { opacity: 0; transform: translateX(-50%) translateY(-14px); }
}

/* ============================================================
   RWD 移动优先
   ============================================================ */
@media (max-width: 480px) {
  body { padding: 12px; align-items: flex-start; padding-top: 24px; }
  .question-card { padding: 24px 18px 20px; border-radius: var(--radius-md); }
  .question-title { font-size: 1.05rem; }
  .option-btn { padding: 12px 14px; font-size: 0.9rem; border-radius: var(--radius-sm); }
  .btn { padding: 10px 20px; font-size: 0.85rem; }
  .modal-card { padding: 24px 18px; }
}
</style>
</head>
<body>

<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="logo">✨ 生活痛点调查</div>
    <div class="subtitle">匿名 · 约3分钟 · 没有对错</div>
  </header>

  <!-- 进度条 -->
  <div class="progress-area">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="progress-label" id="progressLabel">0/16</span>
  </div>

  <!-- 问题卡片 -->
  <div class="question-card" id="questionCard">
    <!-- 动态渲染 -->
  </div>

</div>

<!-- 完成弹窗 -->
<div class="modal-overlay" id="resultModal" style="display:none;">
  <div class="modal-card">
    <div class="modal-header">
      <h2>🎉 提交完成</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:4px;">
        🎉 感谢你的参与！你的回答已保存。
      </p>
      <p id="apiStatus" style="font-size:0.82rem;margin-bottom:10px;">
        <span style="color:#ffb74d;">⏳ 正在同步到服务器…</span>
      </p>
      <p style="font-size:0.8rem;color:var(--text-hint);margin-bottom:0;">
        数据同时保留在浏览器本地，<br>即使服务器不可用也不会丢失。
      </p>
      <pre id="resultJson" style="display:none;"></pre>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary btn-submit" onclick="closeModal()" style="margin-left:0;">
        关闭
      </button>
    </div>
  </div>
</div>

<!-- Toast 容器 -->
<div id="toastContainer"></div>

<script>
/* ============================================================
   问卷数据定义 — 16 道题目
   板块: 日常决定 / 人际沟通 / 情绪心态 / 任务拖延 / 背景习惯
   ============================================================ */
const SECTIONS = {
  daily:   { name: '日常决定与生活琐事', icon: '🍽️', color: '#7c5cbf' },
  social:  { name: '人际与沟通',         icon: '💬', color: '#5b8def' },
  emotion: { name: '情绪与心态调整',     icon: '💜', color: '#e8738a' },
  task:    { name: '任务执行与拖延',     icon: '⏳', color: '#5fc09c' },
  bg:      { name: '背景与习惯',         icon: '📋', color: '#b0a3c8' },
};

// 题目数组: type = 'single' | 'multi'
// sectionKey 对应 SECTIONS 的键
const QUESTIONS = [
  // —— 一、日常决定与生活琐事 ——
  {
    id: 1, sectionKey: 'daily', type: 'multi',
    title: '在日常生活里，做哪些"小决定"最让你纠结浪费时间？',
    options: [
      'A. 今天吃什么（外卖/自己做/食堂），选半天定不下来',
      'B. 穿什么衣服出门，搭配纠结很久',
      'C. 休息时间干什么，刷手机很久也没决定',
      'D. 该不该买某个东西，反复比价下不了决心',
      'E. 以上都没有，我做决定很干脆'
    ]
  },
  {
    id: 2, sectionKey: 'daily', type: 'single',
    title: '关于"今天吃什么"这件事，你的真实状态是？',
    options: [
      'A. 每天都纠结，翻半天外卖App还是不知道点啥',
      'B. 想吃健康点，但不知道怎么做、怎么搭配',
      'C. 想省钱自己做，但一想到买菜备菜洗碗就放弃了',
      'D. 有什么吃什么，不纠结'
    ]
  },
  {
    id: 3, sectionKey: 'daily', type: 'single',
    title: '日常家务和生活维护中，最让你头疼的是什么？',
    options: [
      'A. 打扫整理，总是拖到看不下去才动手',
      'B. 记住各种琐事（缴水电费、取快递、关续费），经常忘记',
      'C. 家里东西坏了不知道找谁修、怎么修、大概多少钱不被坑',
      'D. 换季整理衣物、断舍离，下不了决心扔东西',
      'E. 没什么头疼的'
    ]
  },
  {
    id: 4, sectionKey: 'daily', type: 'single',
    title: '你的作息和健康习惯，符合以下哪种情况？',
    options: [
      'A. 想早睡但每晚都忍不住熬夜，第二天又后悔',
      'B. 想坚持运动，但每次都三分钟热度',
      'C. 想戒掉手机/短视频，但根本控制不住',
      'D. 作息规律、习惯良好，没有这个问题'
    ]
  },

  // —— 二、人际与沟通 ——
  {
    id: 5, sectionKey: 'social', type: 'single',
    title: '在人际交往中，哪类场景最容易让你事后反复琢磨、感到内耗？',
    options: [
      'A. 想拒绝别人（借钱、帮忙、无效社交），但话到嘴边说不出口',
      'B. 线上聊天字斟句酌，发完还要反复检查，怕说错话得罪人',
      'C. 和朋友/伴侣吵架后，不知道怎么开口破冰',
      'D. 被冒犯或调侃时，当下反应不过来，事后越想越气'
    ]
  },
  {
    id: 6, sectionKey: 'social', type: 'single',
    title: '和父母/长辈沟通时，你的真实感受是？',
    options: [
      'A. 他们总是不理解我，说不了几句就想吵',
      'B. 我知道他们为我好，但表达方式让人窒息',

const TOTAL_QUESTIONS = QUESTIONS.length; // 16

// ===== 后端 API 配置 =====
// 部署后改为你的 Render/Railway 后端地址
const API_BASE_URL = 'http://localhost:3000';

/* ============================================================
   状态管理
   ============================================================ */
const STORAGE_KEY = 'survey_life_pain_points';

// 从 LocalStorage 恢复状态
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // 兼容旧数据格式：确保 answers 存在
      if (!parsed.answers) parsed.answers = {};
      return parsed;
    }
  } catch (e) { /* 忽略损坏数据 */ }
  return null;
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { /* quota 满则静默 */ }
}

// 初始化或恢复状态
let saved = loadState();
let state = {
  currentPage: saved?.currentPage ?? 0,           // 0 = 欢迎页, 1-16 = 题目
  answers: saved?.answers ?? {},                   // { questionId: answer }
  startedAt: saved?.startedAt ?? Date.now(),       // 首次打开时间戳
  accumulatedSeconds: saved?.accumulatedSeconds ?? 0, // 之前累计用时
  sessionStart: Date.now(),                        // 本次会话开始
  submitted: saved?.submitted ?? false,
};

// 如果之前已提交过，仍然允许查看/修改（不清除数据）
// 但若已完全提交，重置以便重新填写（看用户需求，这里保留已填数据）

/* ============================================================
   计时器
   ============================================================ */
function getTotalElapsedSeconds() {
  return state.accumulatedSeconds + Math.floor((Date.now() - state.sessionStart) / 1000);
}

// 页面关闭/刷新前，保存累计用时
function flushTimer() {
  state.accumulatedSeconds = getTotalElapsedSeconds();
  state.sessionStart = Date.now();
  saveState(state);
}

// 页面隐藏时刷新（移动端切后台等）
document.addEventListener('visibilitychange', () => {
  if (document.hidden) flushTimer();
});
window.addEventListener('beforeunload', flushTimer);

/* ============================================================
   Toast 提示
   ============================================================ */
function showToast(msg, duration = 2000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('toast-out');
    toast.addEventListener('animationend', () => toast.remove());
  }, duration);
}

/* ============================================================
   渲染问题卡片
   ============================================================ */
const card = document.getElementById('questionCard');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');

function renderPage() {
  const page = state.currentPage;

  // 更新进度条
  const pct = Math.round((page / TOTAL_QUESTIONS) * 100);
  progressFill.style.width = pct + '%';
  progressLabel.textContent = page + '/' + TOTAL_QUESTIONS;

  // 触发动画：先移除再添加
  card.classList.remove('page-enter', 'page-exit');
  void card.offsetWidth; // 强制回流
  card.classList.add('page-enter');

  if (page === 0) {
    renderWelcome();
    return;
  }

  // 1-16 题目
  const q = QUESTIONS[page - 1];
  const section = SECTIONS[q.sectionKey];
  const isMulti = q.type === 'multi';
  const currentAnswer = state.answers[q.id];
  const selectedSet = new Set(
    isMulti && Array.isArray(currentAnswer) ? currentAnswer : [currentAnswer]
  );

  let optionsHTML = '';
  q.options.forEach((opt, idx) => {
    const optKey = String(idx); // 用 index 作为选项键 "0","1","2"...
    const isSelected = selectedSet.has(optKey);
    const extraClass = isMulti ? 'multi-mode' : '';

    optionsHTML += `
      <button class="option-btn ${extraClass} ${isSelected ? 'selected' : ''}"
              onclick="selectOption(${q.id}, '${optKey}')"
              data-opt="${optKey}">
        <span style="flex:1;">${opt}</span>
        ${isMulti ? `<span class="check-icon">✓</span>` : ''}
      </button>`;
  });

  const multiCount = isMulti && Array.isArray(currentAnswer) ? currentAnswer.length : 0;
  const typeHint = isMulti
    ? `<span>🔘 多选 <span class="multi-counter">已选 ${multiCount} 项</span></span>`
    : '<span>🔘 单选</span>';

  card.innerHTML = `
    <span class="section-badge">${section.icon} ${section.name}</span>
    <div class="question-title">${q.id}. ${q.title}</div>
    <div class="question-type-hint">${typeHint}</div>
    <div class="options-list">${optionsHTML}</div>
    <div class="nav-row">
      <button class="btn btn-secondary" onclick="goPrev()">
        ${page === 1 ? '← 首页' : '← 上一题'}
      </button>
      ${page === TOTAL_QUESTIONS
        ? `<button class="btn btn-primary btn-submit" onclick="submitAll()" id="submitBtn">
             ✅ 提交问卷
           </button>`
        : `<button class="btn btn-primary" onclick="goNext()">
             下一题 →
           </button>`
      }
    </div>
  `;

  // 更新提交按钮状态（最后一题时）
  if (page === TOTAL_QUESTIONS) {
    updateSubmitBtn();
  }
}

/* ============================================================
   欢迎页
   ============================================================ */
function renderWelcome() {
  card.innerHTML = `
    <div class="welcome-content">
      <span class="welcome-icon">📝</span>
      <div class="welcome-title">日常生活痛点<br>与需求调查</div>
      <p class="welcome-desc">
        你好！这是一份<strong>完全匿名</strong>的调查，大约需要 3-4 分钟。<br><br>
        我们想了解你在日常生活中遇到的各种小烦恼——<br>
        比如吃什么、人际关系、心情调节这些事。<br><br>
        你的回答可能会变成未来某个<strong>实用工具的灵感来源</strong>。<br>
        请放心填写，没有对错。
      </p>
      <div class="welcome-meta">
        <span>🔒 匿名</span>
        <span>⏱️ ~3分钟</span>
        <span>📋 16题</span>
      </div>
      <button class="btn btn-primary btn-submit" onclick="goNext()" style="max-width:260px;">
        开始填写 ✨
      </button>
    </div>
  `;
}

/* ============================================================
   选项交互
   ============================================================ */
function selectOption(questionId, optKey) {
  if (state.submitted) return; // 已提交则不允许修改

  const q = QUESTIONS.find(q => q.id === questionId);
  if (!q) return;

  if (q.type === 'single') {
    // 单选：直接设置
    state.answers[questionId] = optKey;
  } else {
    // 多选：切换
    let arr = state.answers[questionId];
    if (!Array.isArray(arr)) arr = [];
    const idx = arr.indexOf(optKey);
    if (idx >= 0) {
      arr.splice(idx, 1);
    } else {
      arr.push(optKey);
    }
    state.answers[questionId] = arr;
  }

  // 持久化
  saveState(state);

  // 重新渲染当前页（刷新选项高亮）
  renderPage();
}

/* ============================================================
   页面导航
   ============================================================ */
function goNext() {
  if (state.currentPage < TOTAL_QUESTIONS) {
    state.currentPage++;
    saveState(state);
    renderPage();
  }
}

function goPrev() {
  if (state.currentPage > 0) {
    state.currentPage--;
    saveState(state);
    renderPage();
  }
}

/* ============================================================
   提交校验
   ============================================================ */
function updateSubmitBtn() {
  const btn = document.getElementById('submitBtn');
  if (!btn) return;
  const allAnswered = QUESTIONS.every(q => {
    const ans = state.answers[q.id];
    if (q.type === 'multi') {
      return Array.isArray(ans) && ans.length > 0;
    }
    return ans !== undefined && ans !== null && ans !== '';
  });
  btn.disabled = !allAnswered;
  if (!allAnswered) {
    btn.title = '请完成所有题目后再提交';
  } else {
    btn.title = '';
  }
}

function submitAll() {
  // 最终校验
  const unanswered = QUESTIONS.filter(q => {
    const ans = state.answers[q.id];
    if (q.type === 'multi') return !Array.isArray(ans) || ans.length === 0;
    return ans === undefined || ans === null || ans === '';
  });

  if (unanswered.length > 0) {
    showToast(`⚠️ 还有 ${unanswered.length} 题未完成，请检查后再提交`);
    // 跳转到第一个未完成的题目
    const first = unanswered[0];
    const idx = QUESTIONS.indexOf(first);
    state.currentPage = idx + 1;
    saveState(state);
    renderPage();
    return;
  }

  // 完成！构建完整 JSON
  flushTimer();
  const totalSec = state.accumulatedSeconds;
  const durationMin = Math.floor(totalSec / 60);
  const durationSec = totalSec % 60;

  // 构建可读的答案映射
  const readableAnswers = {};
  QUESTIONS.forEach(q => {
    const sectionName = SECTIONS[q.sectionKey].name;
    const ans = state.answers[q.id];
    if (q.type === 'multi') {
      readableAnswers[`Q${q.id}【${sectionName}】`] = (ans || []).map(k => q.options[parseInt(k)]);
    } else {
      readableAnswers[`Q${q.id}【${sectionName}】`] = ans !== undefined ? q.options[parseInt(ans)] : null;
    }
    // 同时保留原始键值便于看板解析
    readableAnswers[`Q${q.id}_raw`] = ans;
    readableAnswers[`Q${q.id}_type`] = q.type;
  });

  const resultJSON = {
    meta: {
      surveyTitle: '日常生活痛点与需求调查问卷',
      submittedAt: new Date().toISOString(),
      durationSeconds: totalSec,
      durationReadable: `${durationMin}分${durationSec}秒`,
      totalQuestions: TOTAL_QUESTIONS,
    },
    answers: readableAnswers,
  };

  // 标记已提交
  state.submitted = true;
  state.accumulatedSeconds = totalSec;
  saveState(state);

  // 显示正在提交
  document.getElementById('resultModal').style.display = 'flex';
  document.getElementById('resultJson').textContent = JSON.stringify(resultJSON, null, 2);
  // 初始状态
  document.getElementById('apiStatus').innerHTML = '<span style="color:#ffb74d;">⏳ 正在同步到服务器…</span>';

  // 同时存一份到 LocalStorage（离线兼容）
  saveSubmissionToLocalStorage(resultJSON);

  // 发送到后端 API
  submitToServer(resultJSON);
}

/* ============================================================
   发送数据到后端 API
   ============================================================ */
async function submitToServer(resultJSON) {
  try {
    const resp = await fetch(API_BASE_URL + '/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(resultJSON),
    });

    if (resp.ok) {
      const data = await resp.json();
      console.log('✅ 已同步到服务器, ID:', data.id);
      document.getElementById('apiStatus').innerHTML =
        '<span style="color:#81c784;">✅ 数据已同步到服务器（#' + data.id + '）</span>';
    } else {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || 'HTTP ' + resp.status);
    }
  } catch (e) {
    console.warn('⚠️ 服务器同步失败（数据仍保留在本地）:', e.message);
    document.getElementById('apiStatus').innerHTML =
      '<span style="color:#ffb74d;">⚠️ 服务器暂时不可用，数据已保存在本地</span>';
  }
}

/* ============================================================
   存储已提交数据（供看板 LocalStorage 模式使用）
   ============================================================ */
function saveSubmissionToLocalStorage(resultJSON) {
  const SUBMISSIONS_KEY = 'survey_submissions';
  try {
    const raw = localStorage.getItem(SUBMISSIONS_KEY);
    const submissions = raw ? JSON.parse(raw) : [];
    submissions.push(resultJSON);
    localStorage.setItem(SUBMISSIONS_KEY, JSON.stringify(submissions));
  } catch (e) { /* 忽略 */ }
}

/* ============================================================
   弹窗操作
   ============================================================ */
function closeModal() {
  document.getElementById('resultModal').style.display = 'none';
}

// 点击遮罩关闭弹窗
document.getElementById('resultModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ============================================================
   键盘导航
   ============================================================ */
document.addEventListener('keydown', (e) => {
  // 弹窗打开时不响应
  if (document.getElementById('resultModal').style.display === 'flex') return;

  if (e.key === 'ArrowRight' || e.key === 'Enter') {
    e.preventDefault();
    if (state.currentPage === TOTAL_QUESTIONS) {
      submitAll();
    } else {
      goNext();
    }
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goPrev();
  }
});

/* ============================================================
   初始化渲染
   ============================================================ */
renderPage();

console.log('✨ 日常生活痛点问卷已就绪');
console.log('   - 进度自动保存到 LocalStorage');
console.log('   - 支持键盘 ← → 导航');
console.log('   - 提交后自动存储到 survey_submissions');
</script>
