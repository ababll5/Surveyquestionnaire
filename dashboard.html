<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问卷数据看板 — 日常生活痛点调查</title>

<!-- Chart.js v4 CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS 变量
   ============================================================ */
:root {
  --bg-gradient-start: #e8d5f5;
  --bg-gradient-mid: #f0dde8;
  --bg-gradient-end: #fce4ec;

  --card-bg: rgba(255, 255, 255, 0.52);
  --card-border: rgba(255, 255, 255, 0.65);
  --card-shadow: 0 8px 40px rgba(124, 92, 191, 0.10), 0 2px 8px rgba(124, 92, 191, 0.06);

  --text-primary: #3d2e5c;
  --text-secondary: #7b6b9e;
  --text-hint: #b0a3c8;

  --accent-purple: #7c5cbf;
  --accent-pink: #e8738a;
  --accent-rose: #d4627a;
  --accent-blue: #5b8def;
  --accent-green: #5fc09c;
  --accent-orange: #ffb74d;

  --radius-sm: 10px;
  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-full: 999px;

  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'DM Serif Display', 'Noto Sans SC', serif;
  --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--font-sans);
  color: var(--text-primary);
  min-height: 100vh;
  background: linear-gradient(160deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 40%, var(--bg-gradient-end) 100%);
  background-attachment: fixed;
  padding: 20px;
  position: relative;
}

body::before {
  content: '';
  position: fixed; top: -180px; right: -120px;
  width: 450px; height: 450px;
  background: radial-gradient(circle, rgba(232, 115, 138, 0.14) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none; z-index: 0;
}

/* ============================================================
   密码门禁 — 全屏遮罩
   ============================================================ */
.password-gate {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(160deg, #e8d5f5 0%, #f0dde8 40%, #fce4ec 100%);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 18px;
  padding: 24px;
}
.password-gate.hidden { display: none; }

.password-gate .gate-icon { font-size: 4rem; }
.password-gate .gate-title {
  font-family: var(--font-display); font-size: 1.5rem; color: var(--accent-purple);
}
.password-gate .gate-hint { font-size: 0.82rem; color: var(--text-hint); }

.password-input-wrap {
  display: flex; gap: 8px; max-width: 320px; width: 100%;
}
.password-input-wrap input {
  flex: 1; padding: 12px 18px; font-size: 0.95rem; font-family: var(--font-sans);
  border: 1.5px solid rgba(124, 92, 191, 0.25); border-radius: var(--radius-full);
  background: rgba(255,255,255,0.7); color: var(--text-primary);
  outline: none; transition: all var(--transition-smooth);
  backdrop-filter: blur(12px);
}
.password-input-wrap input:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(124,92,191,0.10); }
.password-input-wrap button {
  padding: 12px 22px; font-size: 0.9rem; font-weight: 600; font-family: var(--font-sans);
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-rose));
  color: #fff; border: none; border-radius: var(--radius-full);
  cursor: pointer; transition: all var(--transition-spring); white-space: nowrap;
}
.password-input-wrap button:hover { box-shadow: 0 4px 18px rgba(124,92,191,0.35); transform: translateY(-1px); }
.password-gate .gate-error { font-size: 0.82rem; color: var(--accent-rose); min-height: 20px; }

/* ============================================================
   主容器（初始隐藏，通过密码后显示）
   ============================================================ */
.dashboard-container {
  position: relative; z-index: 1; max-width: 1100px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 18px;
}
.dashboard-container.hidden { display: none; }

/* ============================================================
   Header
   ============================================================ */
.dashboard-header {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
  gap: 12px;
  background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--card-border); border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow); padding: 18px 26px;
}
.dashboard-header .logo-area { display: flex; align-items: center; gap: 12px; }
.dashboard-header .logo-icon { font-size: 2rem; }
.dashboard-header h1 { font-family: var(--font-display); font-size: 1.35rem; color: var(--accent-purple); line-height: 1.3; }
.dashboard-header .subtitle { font-size: 0.8rem; color: var(--text-secondary); }
.header-actions { display: flex; align-items: center; gap: 10px; }
.btn-sm {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.82rem; font-weight: 500; font-family: var(--font-sans);
  color: var(--accent-purple); text-decoration: none;
  padding: 8px 16px; border-radius: var(--radius-full);
  background: rgba(124,92,191,0.07); border: none; cursor: pointer;
  transition: all var(--transition-smooth);
}
.btn-sm:hover { background: rgba(124,92,191,0.15); }

/* ============================================================
   汇总卡片
   ============================================================ */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}
.summary-card {
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-md);
  box-shadow: var(--card-shadow); padding: 18px 20px; text-align: center;
}
.summary-card .card-value { font-family: var(--font-display); font-size: 1.8rem; color: var(--accent-purple); line-height: 1.2; }
.summary-card .card-label { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }

/* ============================================================
   Tab 切换（Insights / 交叉分析 / 图表 / 排行榜）
   ============================================================ */
.nav-tabs {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.nav-tab {
  font-family: var(--font-sans); font-size: 0.82rem; font-weight: 500;
  padding: 9px 18px; border-radius: var(--radius-full);
  border: 1.5px solid rgba(124,92,191,0.12);
  background: rgba(255,255,255,0.45); color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition-spring);
  backdrop-filter: blur(8px); -webkit-tap-highlight-color: transparent;
}
.nav-tab:hover { border-color: rgba(124,92,191,0.3); background: rgba(255,255,255,0.68); }
.nav-tab.active { background: var(--accent-purple); color: #fff; border-color: var(--accent-purple); box-shadow: 0 3px 14px rgba(124,92,191,0.24); }
.nav-tab .badge {
  display: inline-block; background: rgba(255,255,255,0.25); color: inherit;
  font-size: 0.7rem; padding: 2px 8px; border-radius: var(--radius-full); margin-left: 4px;
}
.nav-tab.active .badge { background: rgba(255,255,255,0.28); }

/* ============================================================
   洞察卡片
   ============================================================ */
.insights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.insight-card {
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-md);
  box-shadow: var(--card-shadow); padding: 20px;
  transition: transform var(--transition-smooth);
}
.insight-card:hover { transform: translateY(-2px); }
.insight-card .insight-icon { font-size: 1.6rem; margin-bottom: 6px; display: block; }
.insight-card .insight-title { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.insight-card .insight-value { font-family: var(--font-display); font-size: 1.4rem; color: var(--accent-purple); }
.insight-card .insight-detail { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; margin-top: 4px; }

/* ============================================================
   交叉分析表
   ============================================================ */
.cross-section { display: flex; flex-direction: column; gap: 18px; }
.cross-card {
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-md);
  box-shadow: var(--card-shadow); padding: 20px 18px;
}
.cross-card .cross-title { font-size: 0.92rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.cross-card .cross-subtitle { font-size: 0.76rem; color: var(--text-hint); margin-bottom: 12px; }
.cross-card .cross-chart-wrap { position: relative; min-height: 260px; }
.cross-card .cross-chart-wrap canvas { max-height: 320px; }

/* ============================================================
   排行榜
   ============================================================ */
.ranking-table-wrap {
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-md);
  box-shadow: var(--card-shadow); overflow: hidden;
}
.ranking-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.ranking-table th {
  text-align: left; padding: 12px 16px; font-size: 0.76rem; font-weight: 600;
  color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 1px solid rgba(124,92,191,0.08);
}
.ranking-table td { padding: 10px 16px; border-bottom: 1px solid rgba(124,92,191,0.05); color: var(--text-primary); }
.ranking-table tr:last-child td { border-bottom: none; }
.ranking-table .rank-num {
  font-family: var(--font-display); font-size: 1.1rem; color: var(--accent-purple);
  width: 40px; text-align: center;
}
.ranking-table .rank-bar-wrap { display: flex; align-items: center; gap: 8px; }
.ranking-table .rank-bar {
  height: 8px; border-radius: var(--radius-full);
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
  transition: width 0.5s ease;
}
.ranking-table .rank-pct { font-size: 0.78rem; color: var(--text-secondary); white-space: nowrap; min-width: 48px; text-align: right; }

/* ============================================================
   LocalStorage 状态卡片
   ============================================================ */
.ls-card {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-md);
  box-shadow: var(--card-shadow); padding: 16px 22px;
  font-size: 0.85rem; color: var(--text-secondary);
}
.ls-card.loaded { border-color: rgba(95,192,156,0.3); background: rgba(255,255,255,0.56); }
.ls-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-hint); flex-shrink: 0; }
.ls-card.loaded .ls-dot { background: var(--accent-green); }
.ls-text { font-weight: 500; }

/* ============================================================
   板块筛选标签
   ============================================================ */
.filter-tabs { display: flex; flex-wrap: wrap; gap: 7px; }
.filter-tab {
  font-family: var(--font-sans); font-size: 0.8rem; font-weight: 500;
  padding: 7px 14px; border-radius: var(--radius-full);
  border: 1.5px solid rgba(124,92,191,0.14); background: rgba(255,255,255,0.45);
  color: var(--text-secondary); cursor: pointer;
  transition: all var(--transition-spring); backdrop-filter: blur(8px);
}
.filter-tab:hover { border-color: rgba(124,92,191,0.32); background: rgba(255,255,255,0.68); }
.filter-tab.active { background: var(--accent-purple); color: #fff; border-color: var(--accent-purple); box-shadow: 0 3px 14px rgba(124,92,191,0.24); }

/* ============================================================
   图表卡片
   ============================================================ */
.chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 14px; }
.chart-card {
  background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-md);
  box-shadow: var(--card-shadow); padding: 18px 16px 12px;
  display: flex; flex-direction: column; position: relative;
}
.chart-card .chart-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.chart-card .chart-title { font-size: 0.87rem; font-weight: 600; color: var(--text-primary); line-height: 1.4; flex: 1; }
.chart-card .chart-badge {
  font-size: 0.7rem; font-weight: 500; color: var(--accent-purple);
  background: rgba(124,92,191,0.07); padding: 3px 10px;
  border-radius: var(--radius-full); white-space: nowrap;
}
.chart-card .chart-wrap { flex: 1; position: relative; min-height: 240px; display: flex; align-items: center; justify-content: center; }
.chart-card .chart-wrap canvas { max-height: 280px; }

.chart-download-btn {
  position: absolute; top: 12px; right: 12px;
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid rgba(124,92,191,0.12); background: rgba(255,255,255,0.55);
  color: var(--text-hint); font-size: 0.8rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-smooth); z-index: 2; backdrop-filter: blur(6px);
}
.chart-download-btn:hover { background: rgba(255,255,255,0.88); color: var(--accent-purple); border-color: var(--accent-purple); box-shadow: 0 2px 10px rgba(124,92,191,0.12); }

/* ============================================================
   空状态 / 加载
   ============================================================ */
.empty-state {
  text-align: center; padding: 48px 20px;
  background: var(--card-bg); backdrop-filter: blur(20px);
  border: 1px solid var(--card-border); border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
}
.empty-state .empty-icon { font-size: 3.5rem; display: block; margin-bottom: 10px; }
.empty-state .empty-text { font-size: 1rem; color: var(--text-secondary); font-weight: 500; }
.empty-state .empty-hint { font-size: 0.8rem; color: var(--text-hint); margin-top: 4px; }

.loading-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.3); backdrop-filter: blur(4px);
  z-index: 50; align-items: center; justify-content: center;
}
.loading-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(124,92,191,0.10); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.9); backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.7); border-radius: var(--radius-full);
  padding: 10px 22px; font-size: 0.84rem; font-weight: 500;
  color: var(--text-primary); box-shadow: 0 8px 28px rgba(124,92,191,0.12);
  z-index: 200; animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
.toast-out { animation: toastOut 0.3s ease forwards; }
@keyframes toastOut { from { opacity:1; transform:translateX(-50%) translateY(0); } to { opacity:0; transform:translateX(-50%) translateY(-12px); } }

/* RWD */
@media (max-width: 600px) {
  body { padding: 8px; }
  .dashboard-header { padding: 14px 16px; }
  .dashboard-header h1 { font-size: 1.1rem; }
  .chart-grid { grid-template-columns: 1fr; }
  .insights-grid { grid-template-columns: 1fr; }
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .chart-card .chart-wrap { min-height: 200px; }
  .password-gate .gate-title { font-size: 1.2rem; }
}
</style>
</head>
<body>

<!-- ========== 密码门禁 ========== -->
<div class="password-gate" id="passwordGate">
  <span class="gate-icon">🔐</span>
  <div class="gate-title">数据看板 · 访问验证</div>
  <div class="gate-hint">请输入管理密码以查看统计数据和图表</div>
  <div class="password-input-wrap">
    <input type="password" id="passwordInput" placeholder="请输入密码…" autofocus>
    <button id="passwordBtn">验证 →</button>
  </div>
  <div class="gate-error" id="gateError"></div>
</div>

<!-- ========== 主容器（通过密码后显示） ========== -->
<div class="dashboard-container hidden" id="dashboardContainer">

  <!-- Header -->
  <header class="dashboard-header">
    <div class="logo-area">
      <span class="logo-icon">📊</span>
      <div>
        <h1>数据看板</h1>
        <div class="subtitle">日常生活痛点与需求调查 · 统计分析与洞察</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-sm" onclick="location.reload()" title="刷新数据">🔄 刷新</button>
      <a href="index.html" class="btn-sm">← 返回问卷</a>
    </div>
  </header>

  <!-- 汇总卡片 -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- LocalStorage 状态 -->
  <div class="ls-card" id="lsCard">
    <span class="ls-dot"></span>
    <span class="ls-text">正在连接服务器…</span>
    <button class="btn-sm" id="btnRefresh" style="margin-left:auto;" title="重新加载数据">🔄 刷新数据</button>
  </div>

  <!-- 主导航 Tab -->
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="insights">💡 关键洞察</button>
    <button class="nav-tab" data-tab="cross">🔗 交叉分析</button>
    <button class="nav-tab" data-tab="charts">📈 全部图表</button>
    <button class="nav-tab" data-tab="ranking">🏆 痛点排行</button>
  </div>

  <!-- 图表板块筛选（仅在 charts tab 中显示） -->
  <div class="filter-tabs" id="filterTabs" style="display:none;">
    <button class="filter-tab active" data-filter="all">📋 全部</button>
    <button class="filter-tab" data-filter="daily">🍽️ 日常决定</button>
    <button class="filter-tab" data-filter="social">💬 人际沟通</button>
    <button class="filter-tab" data-filter="emotion">💜 情绪心态</button>
    <button class="filter-tab" data-filter="task">⏳ 任务拖延</button>
    <button class="filter-tab" data-filter="bg">📋 背景习惯</button>
  </div>

  <!-- 内容区域 -->
  <div id="tabContent">
    <!-- 动态渲染 -->
  </div>

</div>

<!-- 加载动画 -->
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div id="toastContainer"></div>

<script>
/* ============================================================
   1. 密码门禁
   ============================================================ */
// 修改此密码：默认 = "dashboard2026"
// 注意：纯前端方案无法做到真正的安全，仅用于阻挡非授权访问
const AUTH_HASH = btoa('123456'); // TVRJeU5EVTI=

(function initPasswordGate() {
  // sessionStorage 中保存本次会话的认证状态
  if (sessionStorage.getItem('dashboard_authed') === '1') {
    document.getElementById('passwordGate').classList.add('hidden');
    document.getElementById('dashboardContainer').classList.remove('hidden');
    initDashboard();
    return;
  }

  const input = document.getElementById('passwordInput');
  const btn = document.getElementById('passwordBtn');
  const error = document.getElementById('gateError');

  function tryAuth() {
    const val = input.value.trim();
    if (!val) { error.textContent = '请输入密码'; return; }
    if (btoa(val) === AUTH_HASH) {
      sessionStorage.setItem('dashboard_authed', '1');
      document.getElementById('passwordGate').classList.add('hidden');
      document.getElementById('dashboardContainer').classList.remove('hidden');
      initDashboard();
    } else {
      error.textContent = '❌ 密码错误，请重试';
      input.value = '';
      input.focus();
    }
  }

  btn.addEventListener('click', tryAuth);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryAuth(); });
})();

/* ============================================================
   2. 题目元数据
   ============================================================ */
const SECTIONS = {
  daily:   { name: '日常决定与生活琐事', icon: '🍽️', color: '#7c5cbf' },
  social:  { name: '人际与沟通',         icon: '💬', color: '#5b8def' },
  emotion: { name: '情绪与心态调整',     icon: '💜', color: '#e8738a' },
  task:    { name: '任务执行与拖延',     icon: '⏳', color: '#5fc09c' },
  bg:      { name: '背景与习惯',         icon: '📋', color: '#b0a3c8' },
};

// 完整选项文本（用于排行榜等展示）
const QUESTIONS_FULL = [
  { id:1,  sectionKey:'daily',   type:'multi',  title:'哪些"小决定"最让你纠结浪费时间？',

   ============================================================ */
async function fetchFromServer() {
  const card=document.getElementById('lsCard');
  const dot=card.querySelector('.ls-dot');
  const text=card.querySelector('.ls-text');

  console.log('📊 [看板] 尝试从后端 API 拉取数据…');
  text.textContent='⏳ 正在从服务器加载数据…';

  try {
    const resp=await fetch(`${API_BASE_URL}/api/stats?token=${ADMIN_TOKEN}`,{
      headers:{'X-Admin-Token':ADMIN_TOKEN}
    });

    if(!resp.ok){
      if(resp.status===401)throw new Error('鉴权失败：管理令牌不匹配，请检查 ADMIN_TOKEN');
      throw new Error('HTTP '+resp.status);
    }

    const data=await resp.json();
    console.log('   ✅ API 返回:', data.meta.totalParticipants, '人,', data.submissions.length, '条记录');

    // 转换 API 数据为内部格式
    allSubmissions=data.submissions.map(s=>({
      meta:{submittedAt:s.submittedAt,durationSeconds:s.durationSeconds},
      parsed:s.parsed,
    }));

    card.classList.add('loaded');
    text.textContent=`✅ 已加载 ${allSubmissions.length} 条记录（来自服务器 · ${data.meta.totalParticipants} 人参与）`;
    return allSubmissions.length;

  } catch(e){
    console.warn('   ⚠️ API 不可用:', e.message);
    console.log('   🔄 回退到 LocalStorage…');
    return loadFromLocalStorageFallback();
  }
}

// LocalStorage 回退方案
function loadFromLocalStorageFallback() {
  const card=document.getElementById('lsCard');
  const dot=card.querySelector('.ls-dot');
  const text=card.querySelector('.ls-text');

  try{
    const raw=localStorage.getItem('survey_submissions');
    if(raw){
      const data=JSON.parse(raw);
      if(Array.isArray(data)&&data.length>0){
        data.forEach(s=>{
          const p=parseSubmission(s);
          if(p)allSubmissions.push(p);
        });
        card.classList.add('loaded');
        text.textContent=`⚠️ 已加载 ${allSubmissions.length} 条本地记录（服务器不可用）`;
        return allSubmissions.length;
      }
    }
    card.classList.remove('loaded');
    text.textContent='📭 暂无数据 — 服务器和本地均无记录';
  }catch(e){
    card.classList.remove('loaded');
    text.textContent='⚠️ 数据加载失败: '+e.message;
  }
  return 0;
}

function parseSubmission(raw){
  if(!raw||!raw.answers)return null;
  const parsed={};
  for(const[key,value]of Object.entries(raw.answers)){
    const m=key.match(/^Q(\d+)_raw$/);
    if(m){
      const qId=parseInt(m[1]);
      const type=raw.answers[`Q${qId}_type`];
      if(type==='multi')parsed[qId]=Array.isArray(value)?value:[];
      else parsed[qId]=typeof value==='string'?value:String(value);
    }
  }
  return {meta:raw.meta||{},parsed};
}

/* ============================================================
   6. 数据聚合
   ============================================================ */
function aggregate(submissions){
  const agg={};
  submissions.forEach(s=>{
    for(const[qIdStr,ans]of Object.entries(s.parsed)){
      const qId=parseInt(qIdStr);
      if(!agg[qId])agg[qId]={};
      if(Array.isArray(ans))ans.forEach(k=>{agg[qId][k]=(agg[qId][k]||0)+1;});
      else agg[qId][ans]=(agg[qId][ans]||0)+1;
    }
  });
  return agg;
}

// 获取某单选题的计数映射 { optionIndex: count }
function getSingleCounts(qId, agg){
  const m=agg[qId]||{};
  const q=QUESTIONS_FULL.find(q=>q.id===qId);
  if(!q)return{};
  const out={};
  q.options.forEach((_,i)=>{out[i]=m[String(i)]||0;});
  return out;
}

  if(dur.length>0){const a=Math.round(dur.reduce((x,y)=>x+y,0)/dur.length);avgT=`${Math.floor(a/60)}分${a%60}秒`;}

  // 统计主要痛点板块：每份提交中，哪个板块的非"没问题"选项最多
  const sectionPain={};
  const noProblemKeys=['3','4','6']; // index of "no problem" type answers - 需要动态判断
  allSubmissions.forEach(s=>{
    for(const[sk,sec]of Object.entries(SECTIONS)){
      const qs=QUESTIONS_FULL.filter(q=>q.sectionKey===sk);
      let painCount=0;
      qs.forEach(q=>{
        const ans=s.parsed[q.id];
        if(ans===undefined||ans===null)return;
        // 检查是否是"没问题"类回答（选项中的最后一项且语义为无问题）
        const lastIdx=String(q.options.length-1);
        if(q.type==='single'&&ans===lastIdx&&(
          q.options[q.options.length-1].includes('不纠结')||
          q.options[q.options.length-1].includes('没有这个')||
          q.options[q.options.length-1].includes('没什么')||
          q.options[q.options.length-1].includes('都还好')||
          q.options[q.options.length-1].includes('不太拖延')||
          q.options[q.options.length-1].includes('作息规律')
        ))return; // skip no-problem answers
        if(q.type==='multi'){
          if(Array.isArray(ans)&&ans.includes(lastIdx)&&q.options[q.options.length-1].includes('以上都没有'))return;
          if(Array.isArray(ans)&&ans.length>0)painCount++;
        }else{
          painCount++;
        }
      });
      if(!sectionPain[sk])sectionPain[sk]=0;
      sectionPain[sk]+=painCount;
    }
  });
  // 找最高痛点的板块
  let maxPainSec='-', maxPainVal=0;
  for(const[sk,v]of Object.entries(sectionPain)){if(v>maxPainVal){maxPainVal=v;maxPainSec=SECTIONS[sk].icon+' '+SECTIONS[sk].name;}}

  row.innerHTML=`
    <div class="summary-card"><div class="card-value">${total}</div><div class="card-label">📥 总参与人数</div></div>
    <div class="summary-card"><div class="card-value">${valid.length}</div><div class="card-label">✅ 完整提交数</div></div>
    <div class="summary-card"><div class="card-value">${avgT}</div><div class="card-label">⏱️ 平均用时</div></div>
    <div class="summary-card"><div class="card-value" style="font-size:1.1rem;">${maxPainSec}</div><div class="card-label">🔥 最痛板块</div></div>
  `;
}

function renderInsights(){
  if(allSubmissions.length===0){return '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">暂无数据</div></div>';}

  const agg=aggregate(allSubmissions);

  const insights=[];

  // 1. 最普遍的单一痛点（单选题目中占比最高的选项，排除"没问题"类）
  let topPain={label:'', pct:0, count:0, qTitle:''};
  QUESTIONS_FULL.filter(q=>q.type==='single').forEach(q=>{
    const counts=getSingleCounts(q.id,agg);
    // 找非最后一项（通常"没问题"在最后）中计数最高的
    const optCounts=[];
    q.options.forEach((opt,i)=>{
      if(i===q.options.length-1&&(opt.includes('不纠结')||opt.includes('没有这个')||opt.includes('没什么')||opt.includes('都还好')||opt.includes('不太拖延')||opt.includes('作息规律')))return;
      optCounts.push({i,opt,count:counts[i]||0});
    });
    optCounts.sort((a,b)=>b.count-a.count);
    if(optCounts.length>0&&optCounts[0].count>topPain.count){
      const pct=total>0?Math.round(optCounts[0].count/total*100):0;
      topPain={label:optCounts[0].opt, pct, count:optCounts[0].count, qTitle:q.title};
    }
  });
  if(topPain.label){
    insights.push({icon:'🎯',title:'最普遍的痛点',value:`${topPain.pct}%`,detail:`"${topPain.label.slice(0,50)}" — 来自 Q${QUESTIONS_FULL.find(q=>q.title===topPain.qTitle)?.id||'?'}`});
  }

  // 3. 情绪消化方式
  const q10c=getSingleCounts(10,agg);
  const q10=QUESTIONS_FULL.find(q=>q.id===10);
  const selfDigest=q10c[0]||0; const q10Total=Object.values(q10c).reduce((a,b)=>a+b,0);
  const selfPct=q10Total>0?Math.round(selfDigest/q10Total*100):0;
  const seekHelp=q10c[3]||0; const seekPct=q10Total>0?Math.round(seekHelp/q10Total*100):0;
  insights.push({icon:'💜',title:'情绪处理模式',value:`${selfPct}% 自己消化`,
    detail:`${selfPct}% 选择自己消化转移注意力；${seekPct}% 想找方法但不知道从哪开始 — 存在未被满足的情绪调节需求`});

  // 4. 拖延严重度
  const q13c=getSingleCounts(13,agg);
  const q13Total=Object.values(q13c).reduce((a,b)=>a+b,0);
  const notProcrast=q13c[3]||0; const notPct=q13Total>0?Math.round(notProcrast/q13Total*100):0;
  const procrastPct=100-notPct;
  insights.push({icon:'⏳',title:'拖延普遍度',value:`${procrastPct}%`,
    detail:`${procrastPct}% 的人存在不同程度的拖延问题，仅 ${notPct}% "不太拖延"`});

  // 5. 社恐程度
  const q7c=getSingleCounts(7,agg);
  const q7Total=Object.values(q7c).reduce((a,b)=>a+b,0);
  const notSocial=q7c[3]||0; const socialPct=q7Total>0?Math.round((q7Total-notSocial)/q7Total*100):0;
  insights.push({icon:'😰',title:'社交不适比例',value:`${socialPct}%`,detail:`${socialPct}% 在社交场合中有不同程度的不适感`});

  // 6. 最需要的工具场景
  const q8c=getSingleCounts(8,agg);
  const q8=QUESTIONS_FULL.find(q=>q.id===8);
  let topTool='',topToolCount=0;
  Object.entries(q8c).forEach(([k,v])=>{if(v>topToolCount){topToolCount=v;topTool=q8.options[parseInt(k)];}});

  let html='<div class="insights-grid">';

    html+=`
      <div class="insight-card">
        <span class="insight-icon">${i.icon}</span>
        <div class="insight-title">${i.title}</div>
        <div class="insight-value">${i.value}</div>
        <div class="insight-detail">${i.detail}</div>

  return html;

/* ============================================================
   10. 图表视图 (Charts Tab)
   ============================================================ */
function renderCharts(filterKey='all'){
  if(allSubmissions.length===0){return '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">暂无数据</div></div>';}

  const agg=aggregate(allSubmissions);
  const filtered=QUESTIONS_FULL.filter(q=>filterKey==='all'?true:q.sectionKey===filterKey);

  // 按板块分组
  const groups={};
  filtered.forEach(q=>{
    const sk=q.sectionKey;
    if(!groups[sk])groups[sk]={section:SECTIONS[sk],questions:[]};
    groups[sk].questions.push(q);
  });

  let html='';
  for(const[sk,g]of Object.entries(groups)){
    html+=`<div style="margin-bottom:14px;"><div style="font-family:var(--font-display);font-size:1.05rem;color:var(--text-primary);padding-left:4px;margin-bottom:10px;">${g.section.icon} ${g.section.name}</div>`;
    html+='<div class="chart-grid">';

    g.questions.forEach(q=>{
      const cid=`chart-${q.id}`;
      const dm=agg[q.id]||{};
      const labels=q.options.map(o=>o.length>20?o.slice(0,18)+'…':o);
      const values=q.options.map((_,i)=>dm[String(i)]||0);
      const total=values.reduce((a,b)=>a+b,0);

      html+=`
        <div class="chart-card" id="card-${cid}">
          <div class="chart-header"><span class="chart-title">Q${q.id}. ${q.title}</span><span class="chart-badge">${q.type==='single'?`单选·饼图·n=${total}`:'多选·条形图'}</span></div>
          <div class="chart-wrap"><canvas id="${cid}"></canvas></div>
          <button class="chart-download-btn" title="下载图表" onclick="downloadChart('${cid}')">📥</button>
        </div>`;

      setTimeout(()=>{
        if(q.type==='single')createPie(cid,labels,values);
        else createBar(cid,labels,values);
      },60);
    });

    html+='</div></div>';
  }
  return html;
}

function createPie(cid,labels,values){
  const c=document.getElementById(cid);if(!c)return;
  chartInstances[cid]=new Chart(c,{
    type:'pie',
    data:{labels,datasets:[{data:values,backgroundColor:CHART_COLORS.slice(0,labels.length),borderColor:'rgba(255,255,255,0.8)',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{position:'bottom',labels:{padding:10,font:{family:"'Noto Sans SC',sans-serif",size:10},color:'#7b6b9e',usePointStyle:true}},
        tooltip:{callbacks:{label:ctx=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);const p=t>0?Math.round(ctx.raw/t*100):0;return` ${ctx.label}: ${ctx.raw}人 (${p}%)`;}}}}}
  });
}
function createBar(cid,labels,values){
  const c=document.getElementById(cid);if(!c)return;
  chartInstances[cid]=new Chart(c,{
    type:'bar',data:{labels,datasets:[{label:'被选次数',data:values,backgroundColor:CHART_COLORS.slice(0,labels.length).map(x=>x+'99'),borderColor:CHART_COLORS.slice(0,labels.length),borderWidth:1.5,borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:true,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw}次`}}},
      scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{family:"'Noto Sans SC',sans-serif",size:10},color:'#b0a3c8'},grid:{color:'rgba(124,92,191,0.05)'}},y:{ticks:{font:{family:"'Noto Sans SC',sans-serif",size:9},color:'#7b6b9e'},grid:{display:false}}}}
  });
}

function destroyAllCharts(){Object.values(chartInstances).forEach(c=>c.destroy());chartInstances={};}

/* ============================================================
   11. 痛点排行榜 (Ranking Tab)
   ============================================================ */
function renderRanking(){
  if(allSubmissions.length===0){return '<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">暂无数据</div></div>';}

  const agg=aggregate(allSubmissions);
  const total=allSubmissions.length;
  const items=[];

  // 收集所有有意义的选项（排除"没问题"类）
  QUESTIONS_FULL.forEach(q=>{
    const dm=agg[q.id]||{};
    q.options.forEach((opt,i)=>{
      const count=dm[String(i)]||0;
      if(count===0)return;
      // 排除明显的"没问题"回答
      const isNoProblem=(i===q.options.length-1)&&(
        opt.includes('不纠结')||opt.includes('没有这个')||opt.includes('没什么')||
        opt.includes('都还好')||opt.includes('不太拖延')||opt.includes('作息规律')||
        opt.includes('以上都没有')||opt.includes('没试过')
      );
      if(isNoProblem&&q.type==='single')return;
      // 对多选的"以上都没有"单独处理
      if(q.type==='multi'&&opt.includes('以上都没有'))return;

      const pct=total>0?Math.round(count/total*100):0;
      const shortOpt=opt.length>55?opt.slice(0,52)+'…':opt;
      items.push({section:SECTIONS[q.sectionKey].icon+' '+SECTIONS[q.sectionKey].name,qTitle:`Q${q.id}`,option:shortOpt,count,pct,sectionKey:q.sectionKey});
    });
  });

  items.sort((a,b)=>b.pct-a.pct);
  const top=items.slice(0,20);
  const maxPct=top.length>0?top[0].pct:1;

  let html=`
    <div class="ranking-table-wrap">
      <table class="ranking-table">
        <thead><tr><th>#</th><th>板块</th><th>题目</th><th>选项</th><th>占比</th></tr></thead>
        <tbody>`;

  top.forEach((item,i)=>{
    html+=`
      <tr>
        <td class="rank-num">${i+1}</td>
        <td style="font-size:0.8rem;">${item.section}</td>
        <td style="font-size:0.78rem;color:var(--text-hint);">${item.qTitle}</td>
        <td>
          <div class="rank-bar-wrap">
            <span style="font-size:0.82rem;flex:1;">${item.option}</span>
            <div class="rank-bar" style="width:${Math.max(item.pct/maxPct*100,2)}%;min-width:4px;"></div>
            <span class="rank-pct">${item.count}人</span>
          </div>
        </td>
        <td style="font-weight:600;color:var(--accent-purple);text-align:center;">${item.pct}%</td>
      </tr>`;
  });

  html+=`</tbody></table></div>
    <p style="font-size:0.76rem;color:var(--text-hint);text-align:center;margin-top:6px;">
      共 ${items.length} 个选项有数据，显示前 ${top.length} 项（按选择人数占比降序排列）
    </p>`;

  return html;
}

/* ============================================================
   12. Tab 切换
   ============================================================ */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-tab="${tab}"]`)?.classList.add('active');

  // 显示/隐藏板块筛选
  document.getElementById('filterTabs').style.display=tab==='charts'?'flex':'none';

  const content=document.getElementById('tabContent');
  destroyAllCharts();
  content.innerHTML='';

  showLoading();
  setTimeout(()=>{
    let html='';
    switch(tab){
      case 'insights':html=renderInsights();break;
      case 'cross':html=renderCrossAnalysis();break;
      case 'charts':html=renderCharts(currentFilter);break;
      case 'ranking':html=renderRanking();break;
    }
    content.innerHTML=html;
    hideLoading();
  },100);
}

// Nav tabs 点击
document.getElementById('navTabs').addEventListener('click',e=>{
  const tab=e.target.closest('.nav-tab');if(!tab)return;
  switchTab(tab.dataset.tab);
});

// 板块筛选
document.getElementById('filterTabs').addEventListener('click',e=>{
  const tab=e.target.closest('.filter-tab');if(!tab)return;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter=tab.dataset.filter;
  const content=document.getElementById('tabContent');
  destroyAllCharts();
  content.innerHTML=renderCharts(currentFilter);
});

/* ============================================================
   13. 图表下载
   ============================================================ */
function downloadChart(chartId){
  const chart=chartInstances[chartId];if(!chart){showToast('⚠️ 图表未加载');return;}
  const a=document.createElement('a');a.href=chart.toBase64Image('image/png',1);a.download=`${chartId}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('✅ 图表已下载');
}

/* ============================================================
   14. 初始化
   ============================================================ */
function initDashboard(){
  console.log('📊 [看板] 初始化开始…');
  try {
    // 绑定刷新按钮
    document.getElementById('btnRefresh').addEventListener('click', async ()=>{
      const btn=document.getElementById('btnRefresh');
      btn.textContent='⏳ 加载中…'; btn.disabled=true;
      allSubmissions=[];
      await fetchFromServer();
      renderSummary();
      switchTab(currentTab);
      btn.textContent='🔄 刷新数据';
      btn.disabled=false;
    });

    // 异步加载数据（优先服务器 → 回退本地）
    fetchFromServer().then(()=>{
      renderSummary();
      switchTab('insights');
      console.log('📊 [看板] 初始化完成 — 有效记录:', allSubmissions.length);
      console.log('   - 数据来源: 后端 API (回退 LocalStorage)');
      console.log('   - 4 大分析模块：洞察 / 交叉分析 / 图表 / 排行榜');
    });

  } catch(e) {
    console.error('❌ [看板] 初始化异常:', e.message, e.stack);
    document.getElementById('tabContent').innerHTML=
      '<div class="empty-state"><span class="empty-icon">⚠️</span><div class="empty-text">看板初始化失败</div><div class="empty-hint">'+e.message+' — 请查看控制台</div></div>';
  }
}
</script>
